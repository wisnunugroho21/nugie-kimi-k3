# Tiny, fully-offline config: synthetic data + byte-level vocab + a small model.
# Runs end-to-end on a laptop CPU in minutes with NO network access — use it to
# smoke-test the whole prepare -> train -> evaluate -> generate path.
#
#   python -m pipeline.prepare_data --config configs/tiny.yaml
#   python -m pipeline.train        --config configs/tiny.yaml
#   python -m pipeline.evaluate     --config configs/tiny.yaml --eval
#   python -m pipeline.evaluate     --config configs/tiny.yaml --generate

model:
  vocab_size: 256        # byte-level / synthetic
  d_model: 128
  n_layers: 4            # -> MLA at layer index 3 (3:1 hybrid)
  full_attn_period: 4
  gdn_num_heads: 4
  gdn_head_k_dim: 32
  gdn_head_v_dim: 32
  gdn_chunk_size: 64
  mla_num_q_heads: 4
  mla_num_kv_heads: 2
  mla_head_dim: 32
  max_seq_len: 256
  moe_d_ff: 256
  moe_n_routed: 8
  moe_n_shared: 1
  moe_top_k: 2
  compute_dtype: float32

data:
  data_dir: data/tiny
  source: synthetic
  tokenizer: byte
  synthetic_train_tokens: 500000
  synthetic_val_tokens: 40000
  seq_len: 128
  num_workers: 0

train:
  batch_size: 8
  max_steps: 200
  lr: 0.0006
  min_lr: 0.00006
  warmup_steps: 20
  weight_decay: 0.1
  grad_clip: 1.0
  router_bias_lr: 0.001
  ckpt_dir: checkpoints/tiny
  save_every: 100
  keep_checkpoints: 2
  log_every: 20
  eval_every: 100
  eval_steps: 10
  seed: 0
