# Single NVIDIA T4 (16 GB) — Google Colab.
#
# Precision: bfloat16. The T4 (Turing, sm_75) has NO bf16 tensor cores, so bf16 here
# buys MEMORY, not tensor-core speed (XLA still upcasts internally). Master weights
# stay fp32 (see the model), which keeps bf16 stable for from-scratch training.
#   - For maximum stability at ~2x the memory, set compute_dtype: float32.
#   - float16 WOULD use the T4's tensor cores, but this pipeline has no loss scaling,
#     so fp16 gradients can underflow — not recommended here.
#
# ~200M params. If you hit OOM, lower batch_size first, then n_layers / moe_n_routed.
#
#   python -m pipeline.prepare_data --config configs/colab_t4.yaml
#   python -m pipeline.train        --config configs/colab_t4.yaml

model:
  vocab_size: 32768
  d_model: 512
  n_layers: 10 # MLA at indices 3, 7 (3:1 hybrid)
  full_attn_period: 4
  gdn_num_heads: 8
  gdn_head_k_dim: 64
  gdn_head_v_dim: 64
  gdn_chunk_size: 64
  gdn_conv_size: 4
  mla_num_q_heads: 8
  mla_num_kv_heads: 2
  mla_head_dim: 64
  max_seq_len: 1024
  moe_d_ff: 1024
  moe_n_routed: 8
  moe_n_shared: 1
  moe_top_k: 2
  compute_dtype: bfloat16

data:
  data_dir: data/codeparrot
  source: huggingface
  hf_dataset: codeparrot/codeparrot-train-v2-near-dedup
  text_field: content
  num_train_docs: 50000
  num_val_docs: 1000
  tokenizer: codeparrot
  tokenizer_name: codeparrot/codeparrot
  seq_len: 512
  num_workers: 2 # Colab usually exposes ~2 CPU cores

train:
  batch_size: 16
  max_steps: 40000
  lr: 0.0003
  min_lr: 0.00003
  warmup_steps: 1000
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  router_bias_lr: 0.001
  ckpt_dir: checkpoints/colab_t4
  save_every: 100
  keep_checkpoints: 2 # Colab disk is small; keep few
  log_every: 20
  eval_every: 2000
  eval_steps: 100
  seed: 0
