# Real training config: the actual CodeParrot corpus + its BPE tokenizer.
# Sized for a single modern GPU (bf16). Scale d_model / n_layers / experts up toward
# the paper's numbers as your hardware allows. On CPU this will be slow — prefer a GPU.
#
#   python -m pipeline.prepare_data --config configs/base.yaml   # streams from HF Hub
#   python -m pipeline.train        --config configs/base.yaml
#   python -m pipeline.evaluate     --config configs/base.yaml --eval
#   python -m pipeline.evaluate     --config configs/base.yaml --generate \
#       --prompt "def quicksort(arr):" --max-new-tokens 128

model:
  vocab_size: 32768 # MUST match the codeparrot tokenizer (checked at startup)
  d_model: 512
  n_layers: 12 # MLA at indices 3, 7, 11 (3:1 hybrid)
  full_attn_period: 4
  gdn_num_heads: 8
  gdn_head_k_dim: 64
  gdn_head_v_dim: 64
  gdn_chunk_size: 64
  gdn_conv_size: 4
  mla_num_q_heads: 8
  mla_num_kv_heads: 2
  mla_head_dim: 64
  max_seq_len: 1024
  moe_d_ff: 1024
  moe_n_routed: 16
  moe_n_shared: 1
  moe_top_k: 2
  compute_dtype: bfloat16

data:
  data_dir: data/codeparrot
  source: huggingface
  hf_dataset: codeparrot/codeparrot-train-v2-near-dedup
  hf_train_split: train
  text_field: content
  num_train_docs: 50000 # raise for a real run (full corpus is enormous)
  num_val_docs: 1000
  tokenizer: codeparrot
  tokenizer_name: codeparrot/codeparrot
  seq_len: 512 # multiple of gdn_chunk_size (64), <= max_seq_len
  num_workers: 4

train:
  batch_size: 16
  max_steps: 50000
  lr: 0.0003
  min_lr: 0.00003
  warmup_steps: 1000
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  router_bias_lr: 0.001
  ckpt_dir: checkpoints/codeparrot
  save_every: 2000
  keep_checkpoints: 3
  log_every: 50
  eval_every: 2000
  eval_steps: 100
  seed: 0
