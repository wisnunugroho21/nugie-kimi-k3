name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAX_PLATFORMS: cpu

jobs:
  quality:
    name: Ruff and Pyright
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
          enable-cache: true
      - name: Install locked environment
        run: uv sync --frozen
      - name: Check formatting
        run: uv run --frozen ruff format --check .
      - name: Lint
        run: uv run --frozen ruff check .
      - name: Type-check
        run: uv run --frozen pyright

  tests:
    name: CPU tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
          enable-cache: true
      - name: Install locked environment
        run: uv sync --frozen
      - name: Run CPU suite
        run: uv run --frozen pytest -m "not multi_device"

  multi-device:
    name: Two-device CPU smoke test
    runs-on: ubuntu-latest
    env:
      JAX_PLATFORMS: cpu
      XLA_FLAGS: --xla_force_host_platform_device_count=2
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
          enable-cache: true
      - name: Install locked environment
        run: uv sync --frozen
      - name: Exercise data-parallel training
        run: uv run --frozen pytest -m multi_device tests/test_data_parallel.py -v
